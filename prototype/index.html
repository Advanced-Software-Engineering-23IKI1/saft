<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>prototype</title>
  </head>
  <body>

  <h2>Spectrogram Viewer</h2>

  <input type="file" id="fileInput" accept=".wav" />
  <button id="processBtn">Compute Spectrogram</button>

  <br><br>

  <script type="module" src="/src/main.js"></script>
  
 <div id="wrapper">
  <div id="canvasRow">
    <canvas id="spectrogramCanvas" width="1" height="1"></canvas>
    <input type="range" id="vScrollbar" min="0" max="100" value="0" orient="vertical">
  </div>

  <input type="range" id="hScrollbar" min="0" max="100" value="0">
</div>

<style>
#wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#canvasRow {
  display: flex;
  flex-direction: row;
  align-items: center;
}

#vScrollbar{
  writing-mode: vertical-lr;  
  direction: rtl;             
  appearance: slider-vertical; 
  -webkit-appearance: slider-vertical;
  height: 1px;        
  accent-color: #9aa0a6;
}

#hScrollbar {
  width: 1px;             
  margin-top: 1px;
  accent-color: #9aa0a6;
}
</style>
</body>
</html>
