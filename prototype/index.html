<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>prototype</title>
  </head>
  <body>

  <h2>Spectrogram Viewer</h2>

  <input type="file" id="fileInput" accept=".wav, .mp3, audio/wav, audio/mpeg" />
  <button id="processBtn">Compute Spectrogram</button>

  <br><br>

  <script type="module" src="/src/main.js"></script>
  
 <div id="wrapper">
  <div id="canvasRow">
    <canvas id="spectrogramCanvas" width="1" height="1"></canvas>
    <input type="range" id="vScrollbar" min="0" max="100" value="0" orient="vertical">
  </div>

  <input type="range" id="hScrollbar" min="0" max="100" value="0">
</div>

<style>

#spectrogramCanvas {
  touch-action: none; /* prevents browser pan/zoom gestures on this element */
}

#wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#canvasRow {
  display: flex;
  flex-direction: row;
  align-items: center;
}

/* Reset default styling */
#vScrollbar,
#hScrollbar {

  margin: 1;
  padding: 1;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  touch-action: none;
}

/* -------------------- */
/* VERTICAL SCROLLBAR   */
/* -------------------- */

#vScrollbar {
  writing-mode: vertical-lr;
  direction: rtl;
  width: 8px;      /* thickness */
  height: 120px;   /* length */
}

/* Transparent track */
#vScrollbar::-webkit-slider-runnable-track {
background: gray;
}

/* Black thumb */
#vScrollbar::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  background: black;
  width: 12px;
  height: 12px;
border-radius: 3px;   cursor: pointer;
  margin-top: -2px;
}

/* Firefox */
#vScrollbar::-moz-range-track {
background: gray;}

#vScrollbar::-moz-range-thumb {
  background: black;
  border: none;
  width: 12px;
  height: 12px;
border-radius: 3px; }


/* -------------------- */
/* HORIZONTAL SCROLLBAR */
/* -------------------- */

#hScrollbar {
  width: 120px;
  height: 8px;
}

/* Transparent track */
#hScrollbar::-webkit-slider-runnable-track {
  background: gray;
}

/* Black thumb */
#hScrollbar::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  background: black;
  width: 12px;
  height: 12px;
border-radius: 3px;   cursor: pointer;
}

/* Firefox */
#hScrollbar::-moz-range-track {
  background: gray;
}

#hScrollbar::-moz-range-thumb {
  background: black;
  border: none;
  width: 12px;
  height: 12px;
border-radius: 3px; }


</style>
</body>
</html>
