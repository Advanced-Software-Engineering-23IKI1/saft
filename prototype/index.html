<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>prototype</title>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>

  <h2>Spectrogram Viewer</h2>

  <input type="file" id="fileInput" accept=".wav, .mp3, audio/wav, audio/mpeg" />

  <button id="processBtn">Compute Spectrogram</button>
  
  <div id="progressLabel">no work</div> 
  <progress id="progressBar" max="100" value="0"></progress>

  <br><br>

  <script type="module" src="/src/main.js"></script>
  
 <div id="wrapper">
  <div id="canvasRow">
    <canvas id="spectrogramCanvas" width="1" height="1"></canvas>
    <input type="range" id="vScrollbar" min="0" max="100" value="0" orient="vertical">
  </div>

  <input type="range" id="hScrollbar" min="0" max="100" value="0">
</div>

</body>
</html>
