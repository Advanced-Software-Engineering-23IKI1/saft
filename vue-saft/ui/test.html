<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Canvas Layout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center">
  <div class="w-full max-w-2xl p-4">
    <!-- Obere Zeile mit Buttons -->
    <div class="flex gap-4 mb-4">
      <button
        class="px-4 py-2 rounded bg-orange-600 text-white hover:bg-blue-700"
      >
        Import
      </button>
      <button
        class="px-4 py-2 rounded bg-orange-600 text-white hover:bg-gray-700"
      >
        Export
      </button>
    </div>

    <!-- Eingerahmtes Fenster für Canvas -->
    <div class="border border-gray-300 rounded bg-white h-80 flex items-center justify-center">
      <!-- Später Canvas hier -->
      <!-- <canvas id="myCanvas" class="w-full h-full"></canvas> -->
      <span class="text-gray-400 text-sm">Canvas-Bereich</span>
    </div>
  </div>
</body>
</html>
